<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 причин ❤️</title>
<style>
body{
margin:0;
font-family:sans-serif;
background: linear-gradient(135deg,#1e1e2f,#6a4c93,#c9184a);
color:white;
text-align:center;
padding:20px;
}
h1{
font-size:28px;
margin-bottom:10px;
}
.timer{
font-size:18px;
margin:20px auto;
padding:15px;
border-radius:14px;
max-width:500px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
}
.container{
display:grid;
grid-template-columns:1fr;
gap:10px;
max-width:500px;
margin:auto;
}
.reason{
background:rgba(255,255,255,0.12);
padding:12px;
border-radius:12px;
font-size:16px;
backdrop-filter:blur(6px);
}
button{
margin-top:30px;
padding:16px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:#ff6fa3;
color:white;
cursor:pointer;
box-shadow:0 0 15px rgba(255,111,163,0.6);
}
.heart{
position:absolute;
font-size:22px;
animation:fall linear infinite;
}
@keyframes fall{
0%{transform:translateY(-10vh) scale(0.5);opacity:1;}
100%{transform:translateY(110vh) scale(1.2);opacity:0;}
}
</style>
</head>
<body>
<h1>100 причин почему я тебя люблю ❤️</h1>
<div class="timer" id="timer"></div>
<div class="container" id="reasons"></div>
<button onclick="loveExplosion()">Будешь моей? 💍</button>
<script>
const startDate = new Date("2026-02-22")
function updateTimer(){
const now = new Date()
const diff = now - startDate
const days = Math.floor(diff/(1000*60*60*24))
const hours = Math.floor((diff/(1000*60*60))%24)
const minutes = Math.floor((diff/(1000*60))%60)
const seconds = Math.floor((diff/1000)%60)
document.getElementById("timer").innerHTML = "Мы вместе уже ❤️ "+days+" дней "+hours+" часов "+minutes+" минут "+seconds+" секунд"
}
setInterval(updateTimer,1000)
updateTimer()
const reasons = []
for(let i=1;i<=100;i++){reasons.push("Это причина номер "+i+" — потому что я тебя люблю ❤️")}
const container = document.getElementById("reasons")
reasons.forEach((text,i)=>{const div=document.createElement("div");div.className="reason";div.innerHTML=(i+1)+". "+text;container.appendChild(div)})
function createHeart(){let heart=document.createElement("div");heart.className="heart";heart.innerHTML="❤️";heart.style.left=Math.random()*100+"vw";heart.style.animationDuration=(3+Math.random()*5)+"s";heart.style.fontSize=(20+Math.random()*20)+"px";document.body.appendChild(heart);setTimeout(()=>{heart.remove()},7000)}
setInterval(createHeart,200)
function loveExplosion(){for(let i=0;i<150;i++){let heart=document.createElement("div");heart.innerHTML="❤️";heart.style.position="fixed";heart.style.left=Math.random()*100+"vw";heart.style.top=Math.random()*100+"vh";heart.style.fontSize="30px";document.body.appendChild(heart);setTimeout(()=>{heart.remove()},3000)}alert("Я тебя очень люблю ❤️")}
</script>
<iframe width="0" height="0" src="https://www.youtube.com/embed/izGwDsrQ1eQ?autoplay=1&loop=1&playlist=izGwDsrQ1eQ" allow="autoplay"></iframe>
</body>
</html>
