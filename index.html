<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
overflow:hidden;
text-align:center;
color:white;
}
.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("photo.jpg") center/cover no-repeat;
filter:brightness(0.7);
z-index:-2;
}
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}
h1{
font-size:38px;
text-shadow:0 0 25px rgba(0,0,0,0.8);
padding:10px;
}
h2{
font-size:24px;
margin-bottom:35px;
text-shadow:0 0 15px rgba(0,0,0,0.7);
}
button{
padding:16px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff6fa3;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 25px rgba(255,111,163,0.8);
}
button:hover{
transform:scale(1.15);
background:#ff4fa3;
}
.heart{
position:absolute;
font-size:28px;
animation:fall linear infinite;
}
@keyframes fall{
0%{transform:translateY(-10vh) scale(0.5);opacity:1;}
100%{transform:translateY(110vh) scale(1.2);opacity:0;}
}
</style>
</head>
<body>
<div class="background"></div>
<div class="overlay"></div>
<div>
<h1>Не грусти, ты самая красивая</h1>
<h2>Безумно люблю тебя ❤️</h2>
<button onclick="location.href='love.html'">Узнай кое-что))</button>
</div>
<script>
function createHeart(){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(3+Math.random()*4)+"s"
heart.style.fontSize=(20+Math.random()*20)+"px"
document.body.appendChild(heart)
setTimeout(()=>{heart.remove()},7000)
}
setInterval(createHeart,200)
</script>
<iframe width="0" height="0" src="https://www.youtube.com/embed/izGwDsrQ1eQ?autoplay=1&loop=1&playlist=izGwDsrQ1eQ" allow="autoplay"></iframe>
</body>
</html>
