<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Montserrat',sans-serif;
  overflow:hidden;
  text-align:center;
  color:white;
  background:#000;
}

/* Фото на фоне */
.background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  filter:brightness(0.6);
  animation:bgPulse 6s ease-in-out infinite alternate;
  z-index:-2;
}
@keyframes bgPulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}

/* затемнение слоя поверх фото */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  z-index:-1;
  backdrop-filter:blur(2px);
}

/* Заголовки */
h1{
  font-size:46px;
  font-family:'Great Vibes';
  text-shadow:0 0 35px rgba(255,105,180,0.8),0 0 60px rgba(255,182,193,0.5);
  padding:10px;
  opacity:0;
  animation:fadeInUp 1.5s forwards;
}
h2{
  font-size:28px;
  margin-bottom:40px;
  text-shadow:0 0 20px rgba(255,182,193,0.8);
  opacity:0;
  animation:fadeInUp 2s forwards;
}
@keyframes fadeInUp{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* Кнопка */
button{
  padding:16px 45px;
  font-size:22px;
  border:none;
  border-radius:50px;
  background:linear-gradient(45deg,#ff6fa3,#ff85b1);
  color:white;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 35px rgba(255,111,163,0.9);
  opacity:0;
  animation:fadeInUp 2.5s forwards;
}
button:hover{
  transform:scale(1.2);
  background:linear-gradient(45deg,#ff4fa3,#ff6fa3);
  box-shadow:0 0 55px rgba(255,77,140,1);
}

/* Летающие сердечки */
.heart{
  position:absolute;
  font-size:28px;
  animation:fall linear infinite;
  opacity:0.9;
  filter:drop-shadow(0 0 8px #ff4fa3);
}
@keyframes fall{
  0%{transform:translateY(-10vh) scale(0.5);opacity:1;}
  100%{transform:translateY(110vh) scale(1.3);opacity:0;}
}
</style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div>
  <h1>Не грусти, ты самая красивая</h1>
  <h2>Безумно люблю тебя ❤️</h2>
  <button onclick="location.href='love.html'">Узнай кое-что))</button>
</div>

<script>
// Летающие сердечки
function createHeart(){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(18+Math.random()*28)+"px";
  heart.style.animationDuration=(3+Math.random()*4)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),7000);
}
setInterval(createHeart,180);

// Эффект взрыва сердечек при нажатии кнопки
document.querySelector("button").addEventListener("click",()=>{
  for(let i=0;i<80;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.top=Math.random()*100+"vh";
    h.style.fontSize=(18+Math.random()*30)+"px";
    h.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }
});
</script>

<iframe width="0" height="0" src="https://www.youtube.com/embed/izGwDsrQ1eQ?autoplay=1&loop=1&playlist=izGwDsrQ1eQ" allow="autoplay"></iframe>

</body>
</html>
